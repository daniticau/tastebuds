databases:
  - name: tastebud-db
    plan: free
    databaseName: tastebud
    user: tastebud

services:
  - type: web
    name: tastebud
    runtime: docker
    plan: free
    envVars:
      - key: TASTEBUD_DATABASE_URL
        fromDatabase:
          name: tastebud-db
          property: connectionString
      - key: FASTMCP_STATELESS_HTTP
        value: "true"
