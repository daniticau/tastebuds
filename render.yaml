databases:
  - name: tastebuds-db
    plan: free
    databaseName: tastebuds
    user: tastebuds

services:
  - type: web
    name: tastebuds
    runtime: docker
    plan: free
    envVars:
      - key: TASTEBUDS_DATABASE_URL
        fromDatabase:
          name: tastebuds-db
          property: connectionString
      - key: FASTMCP_STATELESS_HTTP
        value: "true"
